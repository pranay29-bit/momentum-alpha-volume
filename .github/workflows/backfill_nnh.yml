name: Backfill Net New Highs

on:
  workflow_dispatch: {}   # manual trigger only — run from the Actions tab

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Net New Highs backfill
        env:
          NSE_CSV_PATH: ${{ github.workspace }}/data/NSE_Stocks.csv
        run: python scripts/backfill_nnh.py

      - name: Commit & push history file
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/net_new_highs_history.csv
          git diff --cached --quiet || git commit -m "chore: backfill Net New Highs history"
          git pull --rebase origin main
          git push
